<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — CRM Ing Software</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Sidebar se inyecta via JS -->
  
  <div class="main">
    <div class="topbar">
      <span class="topbar-breadcrumb">
        <a href="/dashboard.html">🏠 Dashboard</a> <span>›</span> Clientes
      </span>
    </div>
    <div class="page-content">
      <div class="page-header">
        <div><h1>Clientes</h1><p>Gestión de clientes y prospectos registrados</p></div>
        <a href="/form_cliente.html" class="btn btn-gold">＋ Nuevo Cliente</a>
      </div>

      <div class="search-bar">
        <div class="form-group">
          <label>Nombre o Razón Social</label>
          <input type="text" id="search-nombre" placeholder="Buscar por nombre...">
        </div>
        <div class="form-group">
          <label>Documento</label>
          <input type="text" id="search-documento" placeholder="NIT, CC, CE...">
        </div>
        <div class="form-group" style="max-width:170px;">
          <label>Tipo</label>
          <select id="search-tipo">
            <option value="">Todos</option>
            <option value="Cliente">Cliente</option>
            <option value="Prospecto">Prospecto</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end;">
          <button class="btn btn-gold" onclick="buscarClientes()">🔍 Buscar</button>
          <button class="btn btn-ghost" onclick="limpiarBusqueda()">✕</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nombre / Razón Social</th>
              <th>Documento</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="clientes-tbody">
            <tr><td colspan="5" class="loading-overlay"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
        <div class="pagination" id="pagination-clientes" style="display:none;">
          <div class="pagination-info" id="pag-info"></div>
          <div class="pagination-controls" id="pag-controls"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-inactivar">
    <div class="modal">
      <div class="modal-icon warning">⚠️</div>
      <div class="modal-title">Inactivar Cliente</div>
      <div class="modal-body">¿Está seguro de que desea inactivar este cliente? Su estado cambiará a <strong>Inactivo</strong>.</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal('modal-inactivar')">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarInactivar()">Inactivar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/clientes.js"></script>
</body>
</html>
